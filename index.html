<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小組點名系統 - 主首頁</title>
    <style>
        :root { --primary-color: #4CAF50; --admin-color: #2196F3; --create-color: #FF9800; }
        
        /* --- 全域遮罩樣式 --- */
        #loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.85);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(3px);
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-msg {
            margin-top: 15px;
            color: #333;
            font-weight: bold;
            font-size: 16px;
        }

        /* --- 原有樣式 --- */
        body { font-family: 'Segoe UI', system-ui, sans-serif; padding: 20px; max-width: 900px; margin: auto; background-color: #f5f7f9; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-link { background: var(--admin-color); color: white; text-decoration: none; padding: 10px 20px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .stats-link:hover { opacity: 0.8; transform: translateY(-2px); }

        #group-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .tag-btn { padding: 20px 10px; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; color: #333; text-align: center; }
        .tag-btn:hover { transform: scale(1.05); box-shadow: 0 6px 12px rgba(0,0,0,0.15); }
        .group-tag { border-top: 5px solid var(--primary-color); }
        .create-tag { border: 2px dashed var(--create-color); color: var(--create-color); background: #fffbf2; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; backdrop-filter: blur(4px); }
        .modal-content { background: white; width: 90%; max-width: 400px; margin: 100px auto; padding: 30px; border-radius: 16px; position: relative; }
        .modal-content h3 { margin-top: 0; color: #333; }
        .modal-content input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .close-btn { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; color: #999; }
        .submit-btn { width: 100%; padding: 12px; background: var(--create-color); color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-msg" id="overlay-text">載入中...</div>
    </div>

    <div class="header">
        <h1>⛪ 小組點名系統</h1>
        <a href="stats.html" class="stats-link">📊 統計中心</a>
    </div>
    
    <div id="group-list-container">
        </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            <h3>✨ 創建新小組</h3>
            <input type="text" id="newGroupName" placeholder="請輸入小組名稱">
            <input type="password" id="newGroupCode" placeholder="請設定小組編號 (密碼)">
            <button class="submit-btn" onclick="createNewGroup()">確認建立</button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzfaWh_ooRTGijLV_7lYFUHFm83oL6DvYt9rt6ze5mDXhtwLv8ymxLX_PGuDTHzmNwe/exec';

        window.onload = fetchGroups;

        // --- Loading 控制函式 ---
        function showLoading(msg = "處理中...") {
            document.getElementById('overlay-text').innerText = msg;
            document.getElementById('loading-overlay').style.display = 'flex';
        }

        function hideLoading() {
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function fetchGroups() {
            showLoading("正在獲取最新小組清單...");
            const container = document.getElementById('group-list-container');
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'getGroups' }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const res = await response.json();
                
                if (res.success) {
                    container.innerHTML = '';
                    res.groups.forEach(group => {
                        const btn = document.createElement('button');
                        btn.className = 'tag-btn group-tag';
                        btn.innerText = group.name;
                        btn.onclick = () => enterGroup(group.name);
                        container.appendChild(btn);
                    });

                    const createBtn = document.createElement('button');
                    createBtn.className = 'tag-btn create-tag';
                    createBtn.innerText = '➕ 創建新小組';
                    createBtn.onclick = () => toggleModal(true);
                    container.appendChild(createBtn);
                }
            } catch (e) {
                container.innerHTML = '<p>讀取失敗，請重新整理頁面</p>';
            } finally {
                hideLoading();
            }
        }

        function toggleModal(show) {
            document.getElementById('createModal').style.display = show ? 'block' : 'none';
        }

        async function createNewGroup() {
            const name = document.getElementById('newGroupName').value;
            const code = document.getElementById('newGroupCode').value;
            if (!name || !code) return alert('請填寫完整資訊');

            showLoading("正在雲端建立小組並設定權限...");
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'createGroup', data: { groupName: name, groupCode: code } }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const res = await response.json();
                alert(res.message);
                if (res.success) {
                    toggleModal(false);
                    fetchGroups();
                }
            } catch (e) {
                alert("建立失敗，請稍後再試。");
            } finally {
                hideLoading();
            }
        }

        async function enterGroup(groupName) {
            const code = prompt(`請輸入【${groupName}】的小組編號：`);
            if (code === null) return;

            showLoading(`正在驗證【${groupName}】的身分...`);
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'verifyGroup', data: { groupName, groupCode: code } }),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });
                const res = await response.json();
                
                if (res.success) {
                    window.location.href = `group.html?name=${encodeURIComponent(groupName)}`;
                } else {
                    alert(res.message);
                }
            } catch (e) {
                alert("驗證時發生網路錯誤。");
            } finally {
                hideLoading();
            }
        }
    </script>
</body>
</html>
