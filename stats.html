<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小組點名系統 - 統計中心</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="loading-msg" id="overlay-text">處理中，請稍候...</div>
    </div>

    <div class="header">
        <h1>📊 統計與報表中心</h1>
        <a href="index.html" style="text-decoration: none; color: #666; font-weight: bold;">⬅️ 回首頁</a>
    </div>

    <div class="filter-box">
        <div class="input-row">
            小組編號：<input type="text" id="groupCode" placeholder="例如：AA01" style="width: 120px; text-transform: uppercase;">
            <span id="idResult" class="status-badge">等待輸入...</span>
            <select id="adminGroupSelect" style="display:none;"></select>
        </div>
        <div class="input-row">
            查詢區間：
            <input type="date" id="startDate"> 
            <span>~</span> 
            <input type="date" id="endDate">
            <button class="btn" style="background: #4CAF50;" onclick="loadStats()">🔍 查詢統計</button>
            <button class="btn" style="background: #2196F3;" onclick="exportToExcel()">📥 匯出 Excel</button>
        </div>
    </div>

    <div id="resultArea" style="overflow-x: auto;">
        <table id="statsTable">
            <thead>
                </thead>
            <tbody>
                </tbody>
        </table>
    </div>
    <script src="https://jirehwang.github.io/LKERP.github.io/config.js"></script>
    <script src="stats.js"></script>
</body>
</html>
